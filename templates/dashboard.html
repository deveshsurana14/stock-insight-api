<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Insight API</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 0.25rem; color: #f8fafc; }
    p.sub { color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }
    .search { display: flex; gap: 12px; margin-bottom: 2rem; }
    input { flex: 1; padding: 10px 16px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #f1f5f9; font-size: 1rem; outline: none; }
    input:focus { border-color: #6366f1; }
    button { padding: 10px 24px; border-radius: 8px; background: #6366f1; color: white; border: none; cursor: pointer; font-size: 1rem; font-weight: 500; }
    button:hover { background: #4f46e5; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 2rem; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; }
    .card .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .card .value { font-size: 1.5rem; font-weight: 600; color: #f1f5f9; }
    .card .sub { font-size: 0.85rem; color: #94a3b8; margin-top: 0.25rem; }
    .signal { display: inline-block; padding: 6px 14px; border-radius: 20px; font-weight: 600; font-size: 0.85rem; }
    .STRONG\.BUY, .signal.STRONG\.BUY { background: #064e3b; color: #34d399; }
    .BUY { background: #052e16; color: #4ade80; }
    .HOLD { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .SELL { background: #431407; color: #fb923c; }
    .STRONG\.SELL { background: #450a0a; color: #f87171; }
    .panel { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .panel h3 { font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
    .reasons li { font-size: 0.9rem; color: #cbd5e1; margin-bottom: 0.4rem; list-style: none; padding-left: 1rem; position: relative; }
    .reasons li::before { content: "→"; position: absolute; left: 0; color: #6366f1; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

    /* Forecast table */
    .forecast-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .forecast-table th { color: #64748b; font-weight: 500; text-align: left; padding: 0 0 0.5rem 0; border-bottom: 1px solid #334155; }
    .forecast-table td { padding: 0.45rem 0; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
    .forecast-table td:first-child { color: #94a3b8; }
    .forecast-table td.price { color: #f1f5f9; font-weight: 600; }

    /* Sentiment */
    .sent-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: 600; font-size: 0.8rem; margin-bottom: 0.75rem; }
    .sent-badge.bullish { background: #052e16; color: #4ade80; }
    .sent-badge.bearish { background: #450a0a; color: #f87171; }
    .sent-badge.neutral  { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .headline-list { list-style: none; }
    .headline-list li { display: flex; align-items: flex-start; gap: 8px; font-size: 0.82rem; color: #cbd5e1; padding: 0.35rem 0; border-bottom: 1px solid #1a2332; }
    .headline-list li:last-child { border-bottom: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .dot.bullish { background: #4ade80; }
    .dot.bearish { background: #f87171; }
    .dot.neutral  { background: #64748b; }

    .error { color: #f87171; font-size: 0.9rem; margin-top: 0.5rem; }
    .loading { color: #64748b; font-size: 0.9rem; }
    .skeleton { background: #1e293b; border-radius: 12px; height: 120px; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <h1>Stock Insight API</h1>
  <p class="sub">Technical analysis · ML forecast · News sentiment</p>

  <div class="search">
    <input id="ticker" type="text" placeholder="e.g. AAPL, TCS.NS, TSLA, INFY.NS" value="AAPL"
      onkeydown="if(event.key==='Enter') analyze()" />
    <button onclick="analyze()">Analyze</button>
  </div>
  <p class="sub" style="margin-top:-1.4rem; margin-bottom:1.8rem; font-size:0.78rem;">
    US stocks: <code style="color:#6366f1">AAPL TSLA MSFT GOOGL</code> &nbsp;·&nbsp;
    Indian (NSE): <code style="color:#6366f1">TCS.NS INFY.NS WIPRO.NS HDFCBANK.NS RELIANCE.NS</code>
  </p>

  <div id="output"></div>

  <script>
    function signalClass(sig) {
      return sig.replace(" ", ".");
    }

    function sentColor(s) {
      if (s >= 0.05) return "bullish";
      if (s <= -0.05) return "bearish";
      return "neutral";
    }

    async function analyze() {
      const ticker = document.getElementById("ticker").value.trim().toUpperCase();
      const out = document.getElementById("output");
      out.innerHTML = '<p class="loading">Fetching data...</p>';

      try {
        const [quoteRes, scoreRes, predictRes, sentRes] = await Promise.all([
          fetch(`/quote/${ticker}`),
          fetch(`/score/${ticker}`),
          fetch(`/predict/${ticker}?days=7`),
          fetch(`/sentiment/${ticker}`)
        ]);

        const quote   = await quoteRes.json();
        const scored  = await scoreRes.json();
        const predict = await predictRes.json();
        const sent    = await sentRes.json();

        if (quote.error || scored.error) {
          out.innerHTML = `<p class="error">❌ ${quote.error || scored.error}</p>`;
          return;
        }

        const sc = signalClass(scored.signal);

        // forecast rows
        const forecastRows = predict.error ? `<tr><td colspan="4" style="color:#f87171">No forecast available</td></tr>` :
          predict.forecast.map(f => `
            <tr>
              <td>${f.date}</td>
              <td class="price">$${f.predicted_price}</td>
              <td>$${f.lower_bound}</td>
              <td>$${f.upper_bound}</td>
            </tr>`).join("");

        // sentiment section
        const sentOverall = sent.error ? null : sent.overall_sentiment;
        const sentSection = sent.error
          ? `<p style="color:#64748b;font-size:0.85rem">No recent news found.</p>`
          : `
            <span class="sent-badge ${sentOverall}">${sentOverall.toUpperCase()}</span>
            <div style="font-size:0.78rem;color:#64748b;margin-bottom:0.75rem">
              Avg score: ${sent.avg_score} &nbsp;·&nbsp; ${sent.articles_analyzed} articles
            </div>
            <ul class="headline-list">
              ${sent.headlines.slice(0, 6).map(h => `
                <li>
                  <span class="dot ${h.sentiment}"></span>
                  <span>${h.headline}</span>
                </li>`).join("")}
            </ul>`;

        out.innerHTML = `
          <div class="cards">
            <div class="card">
              <div class="label">Price</div>
              <div class="value">$${quote.price}</div>
              <div class="sub">${quote.change_pct > 0 ? "▲" : "▼"} ${quote.change_pct}% today</div>
            </div>
            <div class="card">
              <div class="label">Signal</div>
              <div class="value"><span class="signal ${sc}">${scored.signal}</span></div>
              <div class="sub">Score: ${scored.score} / 4</div>
            </div>
            <div class="card">
              <div class="label">RSI (14)</div>
              <div class="value">${scored.rsi}</div>
              <div class="sub">${scored.rsi < 30 ? "Oversold" : scored.rsi > 70 ? "Overbought" : "Neutral"}</div>
            </div>
            <div class="card">
              <div class="label">Volume</div>
              <div class="value">${(quote.volume / 1e6).toFixed(2)}M</div>
              <div class="sub">Today's volume</div>
            </div>
          </div>

          <div class="two-col">
            <div class="panel">
              <h3>7-Day ML Forecast (Prophet)</h3>
              <table class="forecast-table">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Predicted</th>
                    <th>Low</th>
                    <th>High</th>
                  </tr>
                </thead>
                <tbody>${forecastRows}</tbody>
              </table>
            </div>

            <div class="panel">
              <h3>News Sentiment (VADER NLP)</h3>
              ${sentSection}
            </div>
          </div>

          <div class="panel reasons">
            <h3>Analysis breakdown</h3>
            <ul>${scored.reasons.map(r => `<li>${r}</li>`).join("")}</ul>
          </div>
        `;
      } catch (e) {
        out.innerHTML = `<p class="error">❌ Could not connect to API. Is Flask running?</p>`;
      }
    }

    analyze();
  </script>
</body>
</html>
